name: "Run Container Scan on Super Mario Docker Image"

on:
#     push:
#         branches: [ "main" ]
    workflow_call:

jobs:
    container_scan:
        runs-on: ubuntu-latest
        permissions:
          security-events: write # <-- Placed correctly inside the job context
          contents: read         # <-- Good practice: allows action to read repository contents
    
        steps:
        - name: Checkout Repository
          uses: actions/checkout@v4
    
        - name: Run Trivy Container Scan
          uses: aquasecurity/trivy-action@master
          with:
            image-ref: docker.io/nehas1908/supermariogitopsproject:v2
            exit-code: true
            severity: HIGH,CRITICAL
            format: 'sarif'
            output: 'trivy-results.sarif'
        
        - name: Upload Trivy Scan Results
          uses: github/codeql-action/upload-sarif@v4
          with:
                sarif_file: 'trivy-results.sarif'